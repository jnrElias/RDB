<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f14" />
  <title>YT Studio · Planificador</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23ff2d55'/%3E%3Cpath d='M40 32l28 18-28 18z' fill='white'/%3E%3C/svg%3E" />
</head>
<body>

  <!-- ===================== LOGIN ===================== -->
  <div id="lock-screen" class="lock-screen">
    <div class="lock-card">
      <div class="lock-logo">
        <svg viewBox="0 0 100 100" width="56" height="56"><rect width="100" height="100" rx="24" fill="url(#g)"/><path d="M40 32l28 18-28 18z" fill="white"/><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff2d55"/><stop offset="1" stop-color="#ff5e3a"/></linearGradient></defs></svg>
      </div>
      <h1 class="lock-title">YT Studio</h1>
      <p class="lock-sub">Tu espacio privado y cifrado</p>

      <form id="login-form" autocomplete="off">
        <div class="field">
          <label for="email">Correo</label>
          <input id="email" type="email" placeholder="tu@correo.com" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <div class="pw-wrap">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" id="toggle-pw" class="pw-toggle" aria-label="Mostrar contraseña">👁</button>
          </div>
        </div>
        <button type="submit" id="login-btn" class="btn-primary btn-lg">Entrar</button>
        <p id="login-error" class="login-error" hidden>Credenciales incorrectas.</p>
      </form>

      <div class="lock-foot">
        <span class="shield">🔒</span> Cifrado AES-256 · Tus datos nunca salen de este dispositivo
      </div>
    </div>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="app" class="app" hidden>
    <header class="topbar">
      <div class="brand">
        <svg viewBox="0 0 100 100" width="30" height="30"><rect width="100" height="100" rx="24" fill="url(#g2)"/><path d="M40 32l28 18-28 18z" fill="white"/><defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff2d55"/><stop offset="1" stop-color="#ff5e3a"/></linearGradient></defs></svg>
        <span class="brand-name">YT Studio</span>
      </div>
      <div class="topbar-actions">
        <span id="save-state" class="save-state">Guardado</span>
        <button id="btn-export" class="btn-ghost" title="Descargar copia de seguridad cifrada">⬇ Copia</button>
        <button id="btn-import" class="btn-ghost" title="Restaurar copia de seguridad">⬆ Restaurar</button>
        <input id="import-file" type="file" accept="application/json,.json" hidden />
        <button id="btn-logout" class="btn-ghost danger" title="Cerrar sesión">Salir</button>
      </div>
    </header>

    <main class="content">
      <div class="content-head">
        <h2 id="weeks-count" class="section-title">Mis semanas</h2>
        <button id="btn-add-week" class="btn-primary">+ Añadir semana</button>
      </div>
      <div id="weeks" class="weeks"></div>
      <div class="empty-hint" id="empty-hint" hidden>
        No tienes semanas todavía. Pulsa <strong>“Añadir semana”</strong> para empezar.
      </div>
    </main>
  </div>

  <!-- toast -->
  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
